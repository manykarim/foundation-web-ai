name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate static site
        env:
          RF_PAGE: ai
          BASE_URL: /foundation-web-ai/
        run: npx nuxt generate

      - name: Restructure for GH Pages project site
        run: |
          # Nuxt was built with BASE_URL=/foundation-web-ai/ so the HTML's asset
          # references are prefixed with /foundation-web-ai/. To make those
          # references resolve correctly when the page is served at
          # https://<owner>.github.io/foundation-web-ai/, the static files
          # (index.html, _nuxt/, fonts/, favicon/, img/, svg/, etc.) must live
          # at the /foundation-web-ai/ sub-path of the published branch.
          mkdir -p _publish/foundation-web-ai
          # Move all generated assets under foundation-web-ai/
          shopt -s dotglob
          mv .output/public/* _publish/foundation-web-ai/ 2>/dev/null || true
          # Remove the empty .output dir so the artifact is clean
          rm -rf .output

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _publish

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
